<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text to Sign & Speech Converter</title>
    <style>
        :root {
            --primary: #2196F3;
            --secondary: #4CAF50;
            --bg: #f5f7fa;
            --text: #1a1a1a;
            --card-bg: #ffffff;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.1);
            --border-radius: 12px;
            --transition: all 0.3s ease;
        }

        .dark-mode {
            --bg: #1e1e1e;
            --text: #e0e0e0;
            --card-bg: #2a2a2a;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            transition: var(--transition);
        }

        .container {
            max-width: 1400px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            padding: 2rem;
            background: var(--card-bg);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
        }

        .left-panel, .right-panel {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        h1 {
            font-size: 2.5rem;
            color: var(--primary);
            text-align: center;
            margin-bottom: 1rem;
        }

        textarea {
            width: 100%;
            min-height: 200px;
            padding: 1.5rem;
            font-size: 1.25rem;
            border: 2px solid var(--primary);
            border-radius: 8px;
            resize: vertical;
            background: var(--card-bg);
            color: var(--text);
            transition: var(--transition);
        }

        textarea:focus {
            outline: none;
            border-color: var(--secondary);
            box-shadow: 0 0 8px rgba(33, 150, 243, 0.3);
        }

        .text-display {
            font-size: 1.5rem;
            padding: 1.5rem;
            background: var(--card-bg);
            border-radius: 8px;
            border: 1px solid var(--primary);
            min-height: 100px;
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .char-highlight {
            display: inline-block;
            padding: 0.3rem 0.6rem;
            border-radius: 6px;
            transition: var(--transition);
        }

        .char-highlight.active {
            background: var(--primary);
            color: white;
            transform: scale(1.1);
        }

        #display-container {
            width: 100%;
            aspect-ratio: 4/3;
            border: 3px solid var(--primary);
            border-radius: 8px;
            overflow: hidden;
            background: var(--card-bg);
            box-shadow: var(--shadow);
        }

        #current-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transition: opacity 0.3s;
        }

        .controls-section {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .control-group {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 8px;
            box-shadow: var(--shadow);
        }

        .controls {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        button {
            padding: 0.8rem 1.5rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            transition: var(--transition);
        }

        button:hover {
            background: var(--secondary);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .speed-container {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .speed-container label {
            font-weight: 500;
        }

        input[type="range"] {
            width: 100%;
            max-width: 200px;
            accent-color: var(--primary);
        }

        .emotion-panel {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 8px;
            box-shadow: var(--shadow);
        }

        .emotion-item {
            margin: 0.5rem 0;
            padding: 0.8rem;
            background: var(--bg);
            border-radius: 6px;
            font-size: 0.95rem;
        }

        .dark-mode-toggle {
            position: fixed;
            top: 1rem;
            right: 1rem;
            padding: 0.5rem 1rem;
            background: var(--primary);
            color: white;
            border-radius: 20px;
            cursor: pointer;
            transition: var(--transition);
        }

        .dark-mode-toggle:hover {
            background: var(--secondary);
        }

        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 2rem;
            }

            textarea {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="left-panel">
            <h1>Text to Sign & Speech Converter</h1>
            <textarea id="inputText" placeholder="Enter text here (Press Enter to convert)..." rows="8"></textarea>
            <div id="text-display" class="text-display"></div>
            <div class="controls-section">
                <div class="control-group">
                    <h3>Audio Controls</h3>
                    <div class="controls">
                        <button onclick="toggleAudio()" id="audioBtn">▶ Play Audio</button>
                        <button onclick="stopAudio()">⏹ Stop</button>
                    </div>
                    <div class="speed-container">
                        <label>Audio Speed: <span id="audio-speed-value">100</span>%</label>
                        <input type="range" id="audio-speed" min="50" max="200" value="100" step="10" 
                               oninput="updateAudioSpeed(this.value)">
                    </div>
                </div>
                <div class="control-group">
                    <h3>Sign Language Controls</h3>
                    <div class="controls">
                        <button onclick="toggleSigns()" id="signBtn">▶ Play Signs</button>
                        <button onclick="stopSigns()">⏹ Stop</button>
                    </div>
                    <div class="speed-container">
                        <label>Sign Speed: <span id="sign-speed-value">100</span>%</label>
                        <input type="range" id="sign-speed" min="25" max="300" value="100" step="5" 
                               oninput="updateSignSpeed(this.value)">
                    </div>
                </div>
            </div>
        </div>
        <div class="right-panel">
            <div id="display-container">
                <img id="current-image" src="/static/STAND.png" alt="Sign language display">
            </div>
            <div class="emotion-panel">
                <h3>Emotion Analysis</h3>
                <div id="emotions"></div>
                <h4 style="margin-top: 1.5rem;">Speech Settings</h4>
                <div id="speechParams"></div>
            </div>
        </div>
    </div>
    <button class="dark-mode-toggle" onclick="toggleDarkMode()">Toggle Dark Mode</button>

    <script>
        let audioPlayer = null;
        let signInterval = null;
        let currentSequence = [];
        let currentSignIndex = 0;
        let audioSpeed = 1;
        let signSpeed = 1;
        let isAudioPlaying = false;
        let isSignPlaying = false;

        function updateAudioSpeed(value) {
            audioSpeed = value / 100;
            document.getElementById('audio-speed-value').textContent = value;
            if (audioPlayer) {
                audioPlayer.playbackRate = audioSpeed;
            }
        }

        function updateSignSpeed(value) {
            signSpeed = value / 100;
            document.getElementById('sign-speed-value').textContent = value;
            if (isSignPlaying) {
                clearInterval(signInterval);
                startSignAnimation();
            }
        }

        function toggleAudio() {
            if (!audioPlayer) return;
            
            if (isAudioPlaying) {
                audioPlayer.pause();
                isAudioPlaying = false;
            } else {
                audioPlayer.play();
                isAudioPlaying = true;
            }
            updateAudioButton();
        }

        function stopAudio() {
            if (audioPlayer) {
                audioPlayer.pause();
                audioPlayer.currentTime = 0;
            }
            isAudioPlaying = false;
            updateAudioButton();
        }

        function toggleSigns() {
            if (currentSequence.length === 0) return;
            
            if (isSignPlaying) {
                clearInterval(signInterval);
                isSignPlaying = false;
            } else {
                startSignAnimation();
                isSignPlaying = true;
            }
            updateSignButton();
        }

        function stopSigns() {
            clearInterval(signInterval);
            currentSignIndex = 0;
            isSignPlaying = false;
            updateSignButton();
            document.getElementById('current-image').src = '/static/STAND.png';
            updateHighlighting(-1);
        }

        function startSignAnimation() {
            const baseInterval = 2000;
            const adjustedInterval = baseInterval / signSpeed;
            
            clearInterval(signInterval);
            signInterval = setInterval(() => {
                if (currentSignIndex >= currentSequence.length) {
                    stopSigns();
                    return;
                }
                
                const imgFile = currentSequence[currentSignIndex];
                document.getElementById('current-image').src = 
                    `/static/letters/${imgFile}?t=${Date.now()}`;
                
                updateHighlighting(currentSignIndex);
                currentSignIndex++;
            }, adjustedInterval);
        }

        function updateHighlighting(index) {
            const activeIndex = Math.floor(index / 2);
            document.querySelectorAll('.char-highlight').forEach((el, i) => {
                el.classList.toggle('active', i === activeIndex);
            });
        }

        async function startConversion() {
            const text = document.getElementById('inputText').value;
            if (!text) return;

            stopAudio();
            stopSigns();
            
            try {
                const signResponse = await fetch('/generate-signs', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                    body: new URLSearchParams({ text })
                });
                const signData = await signResponse.json();
                currentSequence = signData.sequence;
                currentSignIndex = 0;

                const audioResponse = await fetch('/text-to-audio', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                    body: new URLSearchParams({ text })
                });
                const audioData = await audioResponse.json();

                audioPlayer = new Audio(audioData.audio_url + '&t=' + Date.now());
                audioPlayer.playbackRate = audioSpeed;
                audioPlayer.onended = stopAudio;

                document.getElementById('text-display').innerHTML = 
                    text.split('').map((char, i) => 
                        `<span class="char-highlight" data-index="${i}">${char}</span>`
                    ).join('');
                
                updateEmotions(audioData.emotions);
                updateSpeechParams(audioData.speech_params);

            } catch (error) {
                console.error('Conversion error:', error);
                alert('Conversion failed: ' + error.message);
            }
        }

        function updateAudioButton() {
            const btn = document.getElementById('audioBtn');
            btn.textContent = isAudioPlaying ? '⏸ Pause Audio' : '▶ Play Audio';
        }

        function updateSignButton() {
            const btn = document.getElementById('signBtn');
            btn.textContent = isSignPlaying ? '⏸ Pause Signs' : '▶ Play Signs';
        }

        function updateEmotions(emotions) {
            document.getElementById('emotions').innerHTML = emotions
                .map(e => `<div class="emotion-item">
                    ${e.emotion}: ${Math.round(e.confidence * 100)}%
                </div>`).join('');
        }

        function updateSpeechParams(params) {
            document.getElementById('speechParams').innerHTML = `
                <p>Speed: ${Math.round(params.rate)} wpm</p>
                <p>Volume: ${Math.round(params.volume * 100)}%</p>
                <p>Pitch: ${Math.round(params.pitch)}%</p>
            `;
        }

        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
        }

        document.getElementById('inputText').addEventListener('keypress', async (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                await startConversion();
            }
        });
    </script>
</body>
</html>
